version: '3.9'

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: b2bportal
      POSTGRES_USER: b2buser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2buser -d b2bportal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
